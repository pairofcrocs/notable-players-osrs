name: Apply player submission

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: >-
      github.event.issue.pull_request == null
      && contains(github.event.issue.labels.*.name, 'new player')
      && startsWith(github.event.comment.body, '/approve')
      && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply submission to JSON
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/apply_submission.py

      - name: Regenerate README
        run: python scripts/generate_player_list.py

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/com/notableplayers/notable_players.json README.md
          git commit -m "Add ${{ steps.apply.outputs.player_name }} (#${{ github.event.issue.number }})"
          git push

      - name: Comment success and close issue
        if: success()
        uses: actions/github-script@v7
        env:
          PLAYER_NAME: ${{ steps.apply.outputs.player_name }}
          CATEGORY: ${{ steps.apply.outputs.category }}
        with:
          script: |
            const { PLAYER_NAME, CATEGORY } = process.env;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `Merged: **${PLAYER_NAME}** added under **${CATEGORY}**. Thanks for the submission!`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `Could not apply this submission automatically. See the workflow run: ${runUrl}`
            });
